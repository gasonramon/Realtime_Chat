<div class="auth-container">
  <div class="card">
    <h2>Forgot password</h2>
    <p class="subtitle">We will email you a reset link.</p>
    <div *ngIf="info" class="alert info">{{info}}</div>
    <div *ngIf="error" class="alert error">{{error}}</div>
    <form (ngSubmit)="submit()" class="form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" [(ngModel)]="email" type="email" required />
      </div>
      <button class="btn primary" type="submit" [disabled]="loading">{{ loading ? 'Sending…' : 'Send reset link' }}</button>
      <p class="note"><a routerLink="/login">Back to login</a></p>
    </form>
  </div>
  
</div>
